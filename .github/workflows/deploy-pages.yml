name: Deploy NEON STRIKE V2 to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".pages-deployment-url"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployed URL
        run: |
          printf '%s\n' '${{ steps.deployment.outputs.page_url }}' > .pages-deployment-url
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .pages-deployment-url
          git commit -m 'Record GitHub Pages deployment URL' || exit 0
          git push
