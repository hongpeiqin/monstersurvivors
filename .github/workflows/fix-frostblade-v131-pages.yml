name: Publish Frostblade direct static page

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/fix-frostblade-v131-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frostblade-v131-direct
  cancel-in-progress: true

env:
  DIRECT_GZIP_BLOB_SHA: 0e686e4072ab15361b18f4e246186b3509ed8dba
  DIRECT_HTML_SHA256: 5b0a067587e75dd7b588495b49ccd29961136a4bc72625e410a42867b42b0985

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore and verify direct game HTML
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/blobs/${DIRECT_GZIP_BLOB_SHA}" \
            --output /tmp/frostblade-index.b64

          tr -d '\r\n\t ' < /tmp/frostblade-index.b64 | base64 --decode > /tmp/frostblade-index.html.gz
          gzip --test /tmp/frostblade-index.html.gz
          gzip --decompress --stdout /tmp/frostblade-index.html.gz > /tmp/frostblade-index.html

          echo "${DIRECT_HTML_SHA256}  /tmp/frostblade-index.html" | sha256sum --check --strict
          grep -q '__FROSTBLADE_GAME__' /tmp/frostblade-index.html
          grep -q '1.3.1' /tmp/frostblade-index.html
          ! grep -q 'DecompressionStream' /tmp/frostblade-index.html
          ! grep -q 'payload-v131' /tmp/frostblade-index.html
          ! grep -q 'api.github.com/repos/hongpeiqin/monstersurvivors/git/blobs' /tmp/frostblade-index.html

      - name: Replace every broken loader with the direct page
        shell: bash
        run: |
          set -euo pipefail
          rm -rf frostblade-survivors
          mkdir -p frostblade-survivors/v131 frostblade-survivors/v131-fixed
          cp /tmp/frostblade-index.html frostblade-survivors/index.html
          touch frostblade-survivors/.nojekyll

          cat > frostblade-survivors/v131/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
            <meta http-equiv="refresh" content="0;url=../?v=1.3.1-direct-20260713">
            <title>霜刃幸存者 v1.3.1</title>
          </head>
          <body>
            <a href="../?v=1.3.1-direct-20260713">进入游戏</a>
            <script>location.replace('../?v=1.3.1-direct-20260713');</script>
          </body>
          </html>
          HTML

          cp frostblade-survivors/v131/index.html frostblade-survivors/v131-fixed/index.html

      - name: Commit direct static deployment
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frostblade-survivors
          if git diff --cached --quiet; then
            echo "Direct Frostblade page is already current."
            exit 0
          fi
          git commit -m "fix: publish direct Frostblade v1.3.1 static page"
          git pull --rebase origin main
          git push origin HEAD:main
