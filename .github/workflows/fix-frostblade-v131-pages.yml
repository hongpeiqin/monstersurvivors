name: Publish Frostblade v1.3.1 direct static page

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/fix-frostblade-v131-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frostblade-v131-direct-materialize
  cancel-in-progress: true

env:
  SOURCE_BLOB_SHA: 0e686e4072ab15361b18f4e246186b3509ed8dba
  SOURCE_HTML_SHA256: 5b0a067587e75dd7b588495b49ccd29961136a4bc72625e410a42867b42b0985

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore and verify direct HTML
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/blobs/${SOURCE_BLOB_SHA}" \
            --output /tmp/source-blob.json

          python3 - <<'PY'
          import base64, gzip, hashlib, json
          from pathlib import Path

          payload = json.loads(Path('/tmp/source-blob.json').read_text(encoding='utf-8'))
          outer = base64.b64decode(''.join(payload['content'].split()), validate=True)
          inner = base64.b64decode(''.join(outer.decode('ascii').split()), validate=True)
          html = gzip.decompress(inner)
          digest = hashlib.sha256(html).hexdigest()
          expected = '5b0a067587e75dd7b588495b49ccd29961136a4bc72625e410a42867b42b0985'
          if digest != expected:
              raise SystemExit(f'SHA mismatch: {digest} != {expected}')
          if b'__FROSTBLADE_GAME__' not in html or b'1.3.1' not in html:
              raise SystemExit('unexpected Frostblade build')
          forbidden = (b'DecompressionStream', b'payload-v131', b'api.github.com/repos/hongpeiqin/monstersurvivors/git/blobs')
          if any(item in html for item in forbidden):
              raise SystemExit('runtime loader leaked into direct build')
          Path('/tmp/frostblade-index.html').write_bytes(html)
          print(f'validated direct HTML: {len(html)} bytes, {digest}')
          PY

      - name: Replace broken loaders with direct static game
        shell: bash
        run: |
          set -euo pipefail
          rm -rf frostblade-survivors
          mkdir -p frostblade-survivors/v131 frostblade-survivors/v131-fixed
          cp /tmp/frostblade-index.html frostblade-survivors/index.html
          touch frostblade-survivors/.nojekyll

          cat > frostblade-survivors/v131/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
            <meta http-equiv="refresh" content="0;url=../?v=1.3.1-direct-20260713-r3">
            <title>霜刃幸存者 v1.3.1</title>
          </head>
          <body>
            <a href="../?v=1.3.1-direct-20260713-r3">进入游戏</a>
            <script>location.replace('../?v=1.3.1-direct-20260713-r3');</script>
          </body>
          </html>
          HTML
          cp frostblade-survivors/v131/index.html frostblade-survivors/v131-fixed/index.html

      - name: Commit direct static deployment
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A frostblade-survivors
          if git diff --cached --quiet; then
            echo "Direct Frostblade page is already current."
            exit 0
          fi
          git commit -m "fix: publish direct Frostblade v1.3.1 static page"
          git pull --rebase origin main
          git push origin HEAD:main
