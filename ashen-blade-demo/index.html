<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#05060a"><title>裂界演武场 · 2.5D 战斗 Demo</title><style>html,body{width:100%;height:100%;margin:0;background:#05060a;color:#fff;font:14px system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;overflow:hidden}#boot{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 40%,#31101b 0,#0a0710 40%,#05060a 75%)}.loader{text-align:center;letter-spacing:.16em;color:#78f5df;text-shadow:0 0 20px #26dec0}.loader:before{content:"";display:block;width:58px;height:58px;margin:0 auto 18px;border:2px solid #402533;border-top-color:#78f5df;border-radius:50%;animation:spin .8s linear infinite;box-shadow:0 0 28px #26dec055}.status{margin-top:15px;color:#fff;letter-spacing:0;font-size:13px;opacity:.72}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div id="boot"><div class="loader">裂界演武场<div class="status" id="status">加载角色图集与战斗模块…</div></div></div><script>(async()=>{const status=document.getElementById('status');const files=["payload/p00.txt", "payload/p01.txt", "payload/p02.txt", "payload/p03.txt"].map(x=>`${x}?v=b2c55b12f18e`);try{const parts=[];for(let i=0;i<files.length;i++){status.textContent=`同步战斗模块 ${i+1}/${files.length}`;const r=await fetch(files[i],{cache:'no-store'});if(!r.ok)throw new Error(`${files[i]}: HTTP ${r.status}`);parts.push(await r.text())}if(typeof DecompressionStream==='undefined')throw new Error('当前浏览器不支持 DecompressionStream，请使用最新版 Chrome / Edge / Safari');status.textContent='启动演武场…';const bytes=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0));const html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(html);document.close()}catch(e){console.error(e);document.getElementById('boot').innerHTML=`<div class="loader">载入失败<div class="status">${String(e.message||e)}</div></div>`}})();</script></body></html>
