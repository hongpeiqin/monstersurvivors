<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#07141c">
  <meta name="description" content="霜刃幸存者：七夜远征 v1.3.1，多语言移动端优化版。">
  <title>霜刃幸存者 v1.3.1 · 正在载入</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#07141c;color:#effcff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}body{display:grid;place-items:center}.boot{text-align:center;padding:24px}.sigil{width:62px;height:62px;margin:0 auto 17px;border-radius:50%;border:2px solid rgba(115,230,255,.2);border-top-color:#7ff2c2;border-right-color:#73e6ff;box-shadow:0 0 28px rgba(115,230,255,.22);animation:spin .75s linear infinite}.boot strong{display:block;font-size:18px;letter-spacing:.1em}.boot p{margin:9px 0 0;color:#9eb8c4;font-size:11px;line-height:1.55}.boot a{display:inline-block;margin-top:15px;color:#7ff2c2}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="boot"><div class="sigil"></div><strong>正在开启七夜远征</strong><p id="state">读取战场模块…</p></main>
  <script>
  (async()=>{
    const state=document.getElementById('state');
    const build='1.3.1-pages-api-fallback-20260713';
    const blobShas=[
      '66de1081e1443b39f571c314ce8149c548b858e7',
      '285f4c4005447b9f27bce2b70121bd94827509c1',
      'f7c48bef43f0744387a9d8af74d1b7c809cd8a44',
      'e0f4897bf3631c30f16bbae627f68778faa46660',
      'f6c1ec70e1af030790d16ca0f1ec5b86bccef6a1',
      'c4aee7823c980f47d75bc8ac6c80573c0afb6510',
      'a60b0f1403dc517f94169bc4c4260e802d3904c1',
      '330682512be8943469da45586e4ced062780dd46',
      '4c9571d2d23dafcafbcbd7dc1ceb1db5978b692a'
    ];
    const decodeUtf8Base64=value=>{
      const binary=atob(String(value).replace(/\s/g,''));
      return new TextDecoder().decode(Uint8Array.from(binary,char=>char.charCodeAt(0)));
    };
    async function readLocal(name){
      const response=await fetch(`../payload-v131/${name}?v=${build}`,{cache:'no-store'});
      if(!response.ok)throw new Error(`${name} HTTP ${response.status}`);
      return (await response.text()).trim();
    }
    async function readBlob(sha,index){
      state.textContent=`读取战场模块 ${index+3}/11`;
      const response=await fetch(`https://api.github.com/repos/hongpeiqin/monstersurvivors/git/blobs/${sha}`,{cache:'no-store',headers:{Accept:'application/vnd.github+json'}});
      if(!response.ok)throw new Error(`资源 ${index+3} HTTP ${response.status}`);
      const payload=await response.json();
      return decodeUtf8Base64(payload.content).trim();
    }
    try{
      if(typeof DecompressionStream==='undefined')throw new Error('当前浏览器不支持流式解压，请升级浏览器');
      state.textContent='读取战场模块 1/11';
      const first=await readLocal('s00.txt');
      state.textContent='读取战场模块 2/11';
      const second=await readLocal('s01.txt');
      const rest=await Promise.all(blobShas.map(readBlob));
      state.textContent='构筑霜原与远征营地…';
      const packed=atob([first,second,...rest].join(''));
      const bytes=Uint8Array.from(packed,char=>char.charCodeAt(0));
      const html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
      if(!html.includes('__FROSTBLADE_GAME__')||!html.includes('1.3.1'))throw new Error('游戏资源版本校验失败');
      document.open();document.write(html);document.close();
    }catch(error){
      console.error(error);
      document.body.innerHTML=`<main class="boot"><strong>载入失败</strong><p>${String(error.message||error)}</p><a href="./?retry=${Date.now()}">重新载入</a></main>`;
    }
  })();
  </script>
</body>
</html>
