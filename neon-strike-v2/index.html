<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEON STRIKE V2</title><style>html,body{margin:0;background:#02030b;color:#fff;font:14px system-ui}#boot{position:fixed;inset:0;display:grid;place-items:center;background:#02030b}</style></head><body><div id="boot">正在装载星际战场…</div><script>(async()=>{try{const files=['payload/p00.txt','payload/p01.txt','payload/p02.txt','payload/p03.txt','payload/p04.txt','payload/p05.txt','payload/p06.txt'];const parts=await Promise.all(files.map(async f=>{const r=await fetch(f,{cache:'no-store'});if(!r.ok)throw new Error(`${f}: ${r.status}`);return r.text()}));const b=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0));const h=await new Response(new Blob([b]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(h);document.close()}catch(e){document.getElementById('boot').textContent='载入失败：'+e.message;console.error(e)}})();</script></body></html>
